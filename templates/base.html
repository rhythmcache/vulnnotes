<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}VulnNotes{% endblock %}</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        nav { margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        nav a { margin-right: 12px; }
        .error { color: #b00020; }
        .note-list a { display: block; margin: 6px 0; }
        textarea { width: 100%; height: 120px; }
        input[type=text], input[type=password] { width: 100%; padding: 6px; margin: 4px 0; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        {% if user %}
            <a href="/notes">My Notes</a>
            <a href="/notes/new">New Note</a>
            <a href="/logout">Logout ({{ user[1] }})</a>
        {% else %}
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        {% endif %}
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
